# Configuration for `cargo about`, which generates THIRD-PARTY-NOTICES.md.
#
# Regenerate after changing dependencies (from the workspace root):
#   cargo about generate about.hbs -o THIRD-PARTY-NOTICES.md
#
# The hand-written font / icon / runtime notices live in the template
# preamble (about.hbs); the Rust crate section below is gathered from the
# dependency graph of the shipped binary.

# Scope the dependency graph to what actually ships in the release build.
targets = ["x86_64-pc-windows-msvc"]

# Build- and dev-dependencies are not distributed in the binary.
ignore-build-dependencies = true
ignore-dev-dependencies = true

# Our own unpublished workspace crates (smudgy_*) carry no
# third-party obligation and should not appear in the notices.
private = { ignore = true }

# Permissive licenses we knowingly accept. Anything outside this list is
# surfaced by `cargo about generate` as a warning so it can be reviewed.
accepted = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "BSL-1.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "0BSD",
    "Unlicense",
    "OpenSSL",
    "CDLA-Permissive-2.0",
]
